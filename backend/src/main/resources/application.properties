spring.application.name=faahlor-backend

# Default local development datasource. Use the postgres profile to connect to a real database.
spring.datasource.url=jdbc:h2:mem:faahlor;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8080

logging.level.com.faahlor=INFO
